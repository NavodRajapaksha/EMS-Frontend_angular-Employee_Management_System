<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow p-4" style="width: 400px; border-radius: 15px;">

    <div class="text-center mb-3">
      <div class="bg-primary text-white rounded-circle d-inline-flex justify-content-center align-items-center"
           style="width: 50px; height: 50px;">
        <i class="bi bi-person-plus"></i>
      </div>
    </div>

    <h4 class="text-center fw-bold">Add Employee</h4>
    <p class="text-center text-muted small">
      Fill in the information below to add a new employee.
    </p>

    <form (ngSubmit)="saveEmployee()">

      <!-- Name -->
      <div class="mb-3">
        <label>Full Name</label>
        <input type="text"
               class="form-control"
               [(ngModel)]="employee.name"
               name="name"
               placeholder="John Doe"
               required>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label>Email</label>
        <input type="email"
               class="form-control"
               [(ngModel)]="employee.email"
               name="email"
               placeholder="john.doe@company.com"
               required>
      </div>

      <!-- Age -->
      <div class="mb-3">
        <label>Age</label>
        <input type="number"
               class="form-control"
               [(ngModel)]="employee.age"
               name="age"
               placeholder="25"
               required>
      </div>

      <div class="d-flex justify-content-between">
        <button type="button" class="btn btn-danger">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Employee</button>
      </div>

    </form>

  </div>
</div>
