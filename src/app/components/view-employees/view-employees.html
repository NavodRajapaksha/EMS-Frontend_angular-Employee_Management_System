<app-nav-bar></app-nav-bar>

<div class="container">
  <div class="row">
    <h1 class="text-primary fs-1 text-center mt-3">View Employees</h1>
  </div>
  <div class="row">
    <table class="table">
      <thead>
        <tr>
          <th scope="col">Employee ID</th>
          <th scope="col">Employee Name</th>
          <th scope="col">Employee age</th>
          <th scope="col">Employee Email</th>
          <th scope="col">Action</th>
        </tr>
      </thead>
      <tbody>
        @for (employee of employeeArray ; track employee.id) {
        <tr>
          <td>{{ employee.id }}</td>
          <td>{{ employee.name }}</td>
          <td>{{ employee.age }}</td>
          <td>{{ employee.email }}</td>
          <td><i class="bi bi-archive"></i></td>
        </tr>
        }
      </tbody>
    </table>
  </div>
</div>
