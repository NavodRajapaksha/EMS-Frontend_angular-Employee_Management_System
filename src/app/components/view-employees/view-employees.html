<app-nav-bar></app-nav-bar>

<div class="container mt-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="fw-bold">Employee List</h3>
    <button class="btn btn-primary" routerLink="/add-employees">+ Add Employee</button>
  </div>

  <!-- Search -->
  <div class="mb-3">
    <input type="text" class="form-control" placeholder="Search by name or email...">
  </div>

  <!-- Table Card -->
  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Age</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (employee of employeeArray(); track employee.id) {
            <tr>
              <td>#EMP{{ employee.id }}</td>
              <td class="fw-semibold">{{ employee.name }}</td>
              <td class="text-muted">{{ employee.email }}</td>
              <td>
                <span class="badge bg-info text-dark">{{ employee.age }}</span>
              </td>
              <td class="text-center">
                <!-- ✅ Edit button -->
                <button class="btn btn-sm btn-outline-primary me-2" (click)="openEditModal(employee)">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="deleteEmployee(employee.id)">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="5" class="text-center text-muted py-3">No employees found.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- ✅ Edit Modal -->
@if (showModal()) {
<div class="modal fade show d-block" style="background-color: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 shadow">

      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">Edit Employee</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>

      <div class="modal-body">

        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" [(ngModel)]="selectedEmployee.name">
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="selectedEmployee.email">
        </div>

        <div class="mb-3">
          <label class="form-label">Age</label>
          <input type="number" class="form-control" [(ngModel)]="selectedEmployee.age">
        </div>

      </div>

      <div class="modal-footer border-0">
        <button class="btn btn-secondary" (click)="closeModal()">Cancel</button>
        <button class="btn btn-primary" (click)="updateEmployee()">Save Changes</button>
      </div>

    </div>
  </div>
</div>
}
